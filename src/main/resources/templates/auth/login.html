<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>로그인 — Vdesk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'DM Sans', 'Noto Sans KR', sans-serif; }
    .input-field {
      width: 100%; padding: 0.75rem 1rem;
      border: 1.5px solid #e5e7eb; border-radius: 8px;
      font-size: 0.9rem; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      background: #fafafa;
    }
    .input-field:focus {
      border-color: #ef4444; background: #fff;
      box-shadow: 0 0 0 3px rgba(239,68,68,0.08);
    }
    .btn-primary {
      width: 100%; padding: 0.8rem;
      background: #ef4444; color: #fff;
      border-radius: 8px; font-weight: 600;
      font-size: 0.95rem; border: none; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:hover { background: #dc2626; }
    .btn-primary:active { transform: scale(0.99); }
    .btn-google {
      width: 100%; padding: 0.75rem;
      background: #fff; border: 1.5px solid #e5e7eb;
      border-radius: 8px; font-weight: 500;
      font-size: 0.9rem; cursor: pointer; color: #374151;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .btn-google:hover { border-color: #d1d5db; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .error-msg { color: #ef4444; font-size: 0.82rem; margin-top: 0.4rem; display: none; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card { animation: fadeUp 0.35s ease both; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">

  <div class="w-full max-w-sm card">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-2 mb-2">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="7" fill="#ef4444"/>
          <path d="M7 9h14M7 14h10M7 19h6" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
        <span class="text-2xl font-bold text-gray-900">Vdesk</span>
      </div>
      <p class="text-gray-500 text-sm">원격 데스크톱 서비스</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">

      <h1 class="text-xl font-700 text-gray-900 mb-6" style="font-weight:700">로그인</h1>

      <form id="loginForm" novalidate>
        <div class="mb-4">
          <label class="block text-sm font-500 text-gray-700 mb-1.5" style="font-weight:500">이메일</label>
          <input id="email" type="email" class="input-field" placeholder="example@email.com" autocomplete="email"/>
          <p id="emailErr" class="error-msg">올바른 이메일을 입력해주세요.</p>
        </div>

        <div class="mb-5">
          <div class="flex items-center justify-between mb-1.5">
            <label class="text-sm font-500 text-gray-700" style="font-weight:500">비밀번호</label>
            <a href="/signup" class="text-xs text-red-500 hover:text-red-600">비밀번호 재설정</a>
          </div>
          <input id="password" type="password" class="input-field" placeholder="••••••••" autocomplete="current-password"/>
          <p id="pwErr" class="error-msg">비밀번호를 입력해주세요.</p>
        </div>

        <p id="loginErr" class="error-msg mb-3" style="display:none"></p>

        <button type="submit" class="btn-primary mb-3">로그인</button>

        <div class="flex items-center gap-3 my-4">
          <div class="flex-1 h-px bg-gray-100"></div>
          <span class="text-xs text-gray-400">또는</span>
          <div class="flex-1 h-px bg-gray-100"></div>
        </div>

        <a href="/oauth2/authorization/google" class="btn-google">
          <svg width="18" height="18" viewBox="0 0 18 18">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
            <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Google로 로그인
        </a>
      </form>
    </div>

    <p class="text-center text-sm text-gray-500 mt-5">
      계정이 없으신가요?
      <a href="/signup" class="text-red-500 font-600 hover:text-red-600" style="font-weight:600">회원가입</a>
    </p>
  </div>

  <script>
    // 이미 로그인된 경우 대시보드로
    (async () => {
      try {
        const r = await fetch('/api/auth/me', { credentials: 'include' });
        if (r.ok) window.location.replace('/dashboard');
      } catch {}
    })();

    const form = document.getElementById('loginForm');
    const emailEl = document.getElementById('email');
    const pwEl = document.getElementById('password');
    const emailErr = document.getElementById('emailErr');
    const pwErr = document.getElementById('pwErr');
    const loginErr = document.getElementById('loginErr');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      let valid = true;

      if (!emailEl.value || !/\S+@\S+\.\S+/.test(emailEl.value)) {
        emailErr.style.display = 'block'; valid = false;
      } else { emailErr.style.display = 'none'; }

      if (!pwEl.value) {
        pwErr.style.display = 'block'; valid = false;
      } else { pwErr.style.display = 'none'; }

      if (!valid) return;

      const btn = form.querySelector('button[type=submit]');
      btn.textContent = '로그인 중...'; btn.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: emailEl.value, password: pwEl.value }),
          credentials: 'include'
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('vdesk_auth', '1');
          window.location.href = '/dashboard';
        } else {
          loginErr.textContent = data.message || '로그인에 실패했습니다.';
          loginErr.style.display = 'block';
        }
      } catch {
        loginErr.textContent = '서버와 연결할 수 없습니다.';
        loginErr.style.display = 'block';
      } finally {
        btn.textContent = '로그인'; btn.disabled = false;
      }
    });
  </script>
</body>
</html>
