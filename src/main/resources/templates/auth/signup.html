<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>회원가입 — Vdesk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'DM Sans', 'Noto Sans KR', sans-serif; }
    .input-field {
      width: 100%; padding: 0.75rem 1rem;
      border: 1.5px solid #e5e7eb; border-radius: 8px;
      font-size: 0.9rem; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      background: #fafafa;
    }
    .input-field:focus {
      border-color: #ef4444; background: #fff;
      box-shadow: 0 0 0 3px rgba(239,68,68,0.08);
    }
    .input-field:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary {
      width: 100%; padding: 0.8rem;
      background: #ef4444; color: #fff;
      border-radius: 8px; font-weight: 600;
      font-size: 0.95rem; border: none; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:hover:not(:disabled) { background: #dc2626; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline {
      padding: 0.75rem 1.2rem;
      background: #fff; border: 1.5px solid #ef4444;
      border-radius: 8px; font-weight: 500; font-size: 0.88rem;
      cursor: pointer; color: #ef4444; white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-outline:hover:not(:disabled) { background: #fef2f2; }
    .btn-outline:disabled { opacity: 0.4; cursor: not-allowed; }
    .step-dot {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 600;
      transition: all 0.2s;
    }
    .step-dot.active { background: #ef4444; color: #fff; }
    .step-dot.done { background: #dcfce7; color: #16a34a; }
    .step-dot.inactive { background: #f3f4f6; color: #9ca3af; }
    .error-msg { color: #ef4444; font-size: 0.82rem; margin-top: 0.35rem; }
    .success-msg { color: #16a34a; font-size: 0.82rem; margin-top: 0.35rem; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .step-panel { animation: fadeUp 0.25s ease both; }
    .pw-strength { height: 3px; border-radius: 2px; transition: width 0.3s, background 0.3s; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">

  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-6">
      <a href="/login" class="inline-flex items-center gap-2">
        <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="7" fill="#ef4444"/>
          <path d="M7 9h14M7 14h10M7 19h6" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
        <span class="text-xl font-bold text-gray-900">Vdesk</span>
      </a>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">

      <!-- Step indicator -->
      <div class="flex items-center mb-7">
        <div id="dot1" class="step-dot active">1</div>
        <div class="flex-1 h-px bg-gray-200 mx-2"></div>
        <div id="dot2" class="step-dot inactive">2</div>
        <div class="flex-1 h-px bg-gray-200 mx-2"></div>
        <div id="dot3" class="step-dot inactive">3</div>
      </div>

      <!-- Step 1: 이메일 입력 & 인증코드 발송 -->
      <div id="step1" class="step-panel">
        <h1 class="text-xl font-bold text-gray-900 mb-1">이메일 인증</h1>
        <p class="text-sm text-gray-500 mb-5">사용할 이메일 주소를 입력하세요</p>

        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1.5">이메일</label>
          <div class="flex gap-2">
            <input id="s1Email" type="email" class="input-field" placeholder="example@email.com"/>
            <button id="btnSendCode" onclick="sendCode()" class="btn-outline">발송</button>
          </div>
          <p id="s1EmailErr" class="error-msg" style="display:none"></p>
          <p id="s1EmailOk" class="success-msg" style="display:none">인증코드가 발송됐습니다.</p>
        </div>

        <div id="codeBox" class="mb-5" style="display:none">
          <label class="block text-sm font-medium text-gray-700 mb-1.5">인증코드</label>
          <input id="s1Code" type="text" class="input-field" placeholder="6자리 코드 입력" maxlength="6"/>
          <p id="s1CodeErr" class="error-msg" style="display:none"></p>
        </div>

        <button id="btnVerify" onclick="verifyCode()" class="btn-primary" disabled>다음</button>
      </div>

      <!-- Step 2: 비밀번호 설정 -->
      <div id="step2" class="step-panel" style="display:none">
        <h1 class="text-xl font-bold text-gray-900 mb-1">비밀번호 설정</h1>
        <p class="text-sm text-gray-500 mb-5">8자 이상, 영문+숫자 포함</p>

        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1.5">이름</label>
          <input id="s2Name" type="text" class="input-field" placeholder="홍길동"/>
          <p id="s2NameErr" class="error-msg" style="display:none"></p>
        </div>

        <div class="mb-3">
          <label class="block text-sm font-medium text-gray-700 mb-1.5">비밀번호</label>
          <input id="s2Pw" type="password" class="input-field" placeholder="••••••••" oninput="checkStrength()"/>
          <div class="flex gap-1 mt-2">
            <div id="bar1" class="pw-strength w-1/3 bg-gray-200"></div>
            <div id="bar2" class="pw-strength w-1/3 bg-gray-200"></div>
            <div id="bar3" class="pw-strength w-1/3 bg-gray-200"></div>
          </div>
          <p id="s2PwErr" class="error-msg" style="display:none"></p>
        </div>

        <div class="mb-5">
          <label class="block text-sm font-medium text-gray-700 mb-1.5">비밀번호 확인</label>
          <input id="s2PwConfirm" type="password" class="input-field" placeholder="••••••••"/>
          <p id="s2PwConfirmErr" class="error-msg" style="display:none"></p>
        </div>

        <p id="s2Err" class="error-msg mb-3" style="display:none"></p>
        <button onclick="doSignup()" class="btn-primary">가입 완료</button>
      </div>

      <!-- Step 3: 완료 -->
      <div id="step3" class="step-panel text-center" style="display:none">
        <div class="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg width="32" height="32" fill="none" viewBox="0 0 24 24">
            <path d="M5 13l4 4L19 7" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1 class="text-xl font-bold text-gray-900 mb-2">가입 완료!</h1>
        <p class="text-sm text-gray-500 mb-6">Vdesk에 오신 것을 환영합니다</p>
        <a href="/login" class="btn-primary inline-block text-center no-underline">로그인하기</a>
      </div>
    </div>

    <p class="text-center text-sm text-gray-500 mt-5">
      이미 계정이 있으신가요?
      <a href="/login" class="text-red-500 font-semibold hover:text-red-600">로그인</a>
    </p>
  </div>

  <script>
    let verifiedEmail = '';
    let codeSent = false;

    // 발송 버튼 클릭
    async function sendCode() {
      const email = document.getElementById('s1Email').value.trim();
      const err = document.getElementById('s1EmailErr');
      const ok = document.getElementById('s1EmailOk');
      err.style.display = 'none'; ok.style.display = 'none';

      if (!/\S+@\S+\.\S+/.test(email)) {
        err.textContent = '올바른 이메일을 입력해주세요.'; err.style.display = 'block'; return;
      }

      const btn = document.getElementById('btnSendCode');
      btn.disabled = true; btn.textContent = '발송 중...';

      try {
        // 중복 체크
        const dupRes = await fetch('/api/auth/duplications/email', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email })
        });
        const dupData = await dupRes.json();
        if (dupData.result === true) {
          err.textContent = '이미 가입된 이메일입니다.'; err.style.display = 'block';
          btn.disabled = false; btn.textContent = '재발송'; return;
        }

        const res = await fetch('/api/auth/email/verification', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email })
        });
        if (res.ok) {
          ok.style.display = 'block';
          document.getElementById('codeBox').style.display = 'block';
          document.getElementById('btnVerify').disabled = false;
          document.getElementById('s1Email').disabled = true;
          codeSent = true;
          btn.textContent = '재발송';
        } else {
          err.textContent = '발송에 실패했습니다. 다시 시도해주세요.'; err.style.display = 'block';
        }
      } catch {
        err.textContent = '서버와 연결할 수 없습니다.'; err.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    }

    // 인증코드 확인
    async function verifyCode() {
      const email = document.getElementById('s1Email').value.trim();
      const code = document.getElementById('s1Code').value.trim();
      const err = document.getElementById('s1CodeErr');

      if (!codeSent) { alert('먼저 인증코드를 발송해주세요.'); return; }
      if (code.length !== 6) {
        err.textContent = '6자리 코드를 입력해주세요.'; err.style.display = 'block'; return;
      }

      const btn = document.getElementById('btnVerify');
      btn.textContent = '확인 중...'; btn.disabled = true;

      try {
        const res = await fetch('/api/auth/email/verify', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email, code })
        });
        const data = await res.json();
        if (data.result === true) {
          verifiedEmail = email;
          goToStep(2);
        } else {
          err.textContent = '코드가 일치하지 않습니다.'; err.style.display = 'block';
          btn.disabled = false; btn.textContent = '다음';
        }
      } catch {
        err.textContent = '서버와 연결할 수 없습니다.'; err.style.display = 'block';
        btn.disabled = false; btn.textContent = '다음';
      }
    }

    // 회원가입 최종
    async function doSignup() {
      const name = document.getElementById('s2Name').value.trim();
      const pw = document.getElementById('s2Pw').value;
      const pwc = document.getElementById('s2PwConfirm').value;
      const nameErr = document.getElementById('s2NameErr');
      const pwErr = document.getElementById('s2PwErr');
      const pwcErr = document.getElementById('s2PwConfirmErr');
      const s2Err = document.getElementById('s2Err');
      [nameErr, pwErr, pwcErr, s2Err].forEach(e => e.style.display = 'none');

      let valid = true;
      if (!name || name.length < 2) { nameErr.textContent = '이름은 2자 이상 입력해주세요.'; nameErr.style.display = 'block'; valid = false; }
      if (!/^(?=.*[A-Za-z])(?=.*\d).{8,}$/.test(pw)) { pwErr.textContent = '영문+숫자 포함 8자 이상이어야 합니다.'; pwErr.style.display = 'block'; valid = false; }
      if (pw !== pwc) { pwcErr.textContent = '비밀번호가 일치하지 않습니다.'; pwcErr.style.display = 'block'; valid = false; }
      if (!valid) return;

      const btn = event.target;
      btn.textContent = '처리 중...'; btn.disabled = true;

      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email: verifiedEmail, userName: name, password: pw, confirmPassword: pwc })
        });
        const data = await res.json();
        if (res.ok) {
          goToStep(3);
        } else {
          s2Err.textContent = data.message || '가입에 실패했습니다.'; s2Err.style.display = 'block';
          btn.textContent = '가입 완료'; btn.disabled = false;
        }
      } catch {
        s2Err.textContent = '서버와 연결할 수 없습니다.'; s2Err.style.display = 'block';
        btn.textContent = '가입 완료'; btn.disabled = false;
      }
    }

    // 비밀번호 강도
    function checkStrength() {
      const pw = document.getElementById('s2Pw').value;
      const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3')];
      let score = 0;
      if (pw.length >= 8) score++;
      if (/[A-Za-z]/.test(pw) && /\d/.test(pw)) score++;
      if (/[!@#$%^&*]/.test(pw)) score++;
      const colors = ['#ef4444', '#f59e0b', '#22c55e'];
      bars.forEach((b, i) => { b.style.background = i < score ? colors[score - 1] : '#e5e7eb'; });
    }

    function goToStep(n) {
      [1, 2, 3].forEach(i => {
        document.getElementById('step' + i).style.display = i === n ? 'block' : 'none';
        const dot = document.getElementById('dot' + i);
        if (i < n) { dot.className = 'step-dot done'; dot.textContent = '✓'; }
        else if (i === n) { dot.className = 'step-dot active'; dot.textContent = i; }
        else { dot.className = 'step-dot inactive'; dot.textContent = i; }
      });
    }
  </script>
</body>
</html>
