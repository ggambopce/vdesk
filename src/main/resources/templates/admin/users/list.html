<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>회원관리 — Vdesk 관리자</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'DM Sans', 'Noto Sans KR', sans-serif; box-sizing: border-box; }
    body { background: #f8f9fa; margin: 0; }
    .page-card { background: #fff; border-radius: 12px; border: 1px solid #f0f0f0; padding: 24px; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .admin-table th { text-align: left; padding: 11px 14px; color: #6b7280; font-weight: 600; font-size: 12px; border-bottom: 2px solid #f0f0f0; white-space: nowrap; }
    .admin-table td { padding: 12px 14px; color: #374151; border-bottom: 1px solid #f9fafb; }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: #fafafa; }
    .search-input { padding: 7px 12px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 13px; outline: none; transition: border-color 0.15s; }
    .search-input:focus { border-color: #ef4444; }
    .search-select { padding: 7px 10px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 13px; background: #fff; cursor: pointer; }
    .btn-search { padding: 7px 16px; background: #ef4444; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-search:hover { background: #dc2626; }
    .btn-page { padding: 5px 10px; border: 1px solid #e5e7eb; border-radius: 6px; background: #fff; font-size: 12px; cursor: pointer; color: #374151; }
    .btn-page:hover { background: #f9fafb; }
    .btn-page.active { background: #ef4444; color: #fff; border-color: #ef4444; }
    .badge-login { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-normal { background: #f3f4f6; color: #374151; }
    .badge-google { background: #fef3c7; color: #92400e; }
    .badge-kakao { background: #fef9c3; color: #713f12; }
    .badge-naver { background: #dcfce7; color: #166534; }
    .badge-apple { background: #f3f4f6; color: #111; }
    .ip-link { color: #3b82f6; text-decoration: none; }
    .ip-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div th:replace="~{fragments/header :: header('admin')}"></div>
<div style="display:flex;height:calc(100vh - 70px);overflow:hidden;">
  <div th:replace="~{fragments/admin-sidebar :: sidebar('users')}"></div>

  <main style="flex:1;overflow-y:auto;padding:28px 32px;">
    <div style="margin-bottom:20px;">
      <h1 style="font-size:20px;font-weight:700;color:#111;margin:0 0 4px;">회원관리</h1>
      <p style="font-size:13px;color:#6b7280;margin:0;">전체 가입 회원 목록을 조회하고 관리합니다.</p>
    </div>

    <div class="page-card">
      <!-- Header: count + search -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;">
        <span style="font-size:15px;font-weight:700;color:#111;">사용자 <span id="totalCount" style="color:#ef4444;">-</span>건</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <select id="searchField" class="search-select">
            <option value="email">사용자ID</option>
            <option value="loginType">로그인 타입</option>
          </select>
          <input id="searchInput" class="search-input" type="text" placeholder="검색어를 입력해주세요." style="width:220px;"
                 onkeydown="if(event.key==='Enter')doSearch()"/>
          <button class="btn-search" onclick="doSearch()">검색</button>
        </div>
      </div>

      <!-- Table -->
      <table class="admin-table">
        <thead>
          <tr>
            <th style="width:60px;">번호</th>
            <th>아이디</th>
            <th>이메일</th>
            <th>이름</th>
            <th>휴대폰번호</th>
            <th>가입자 IP 주소</th>
            <th>가입날짜</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="7" style="text-align:center;padding:32px;color:#9ca3af;">불러오는 중...</td></tr>
        </tbody>
      </table>

      <!-- Pagination -->
      <div id="pagination" style="display:flex;align-items:center;justify-content:center;gap:4px;margin-top:18px;padding-top:14px;border-top:1px solid #f5f5f5;"></div>
    </div>
  </main>
</div>

<script>
  let currentPage = 1;
  let totalPages = 1;
  let totalItems = 0;

  async function loadUsers(page, q) {
    page = page || 1;
    const field = document.getElementById('searchField').value;
    const query = q !== undefined ? q : (document.getElementById('searchInput').value.trim());
    let url = `/api/admin/users?page=${page}&size=20`;
    if (query) {
      if (field === 'loginType') url += `&loginType=${encodeURIComponent(query)}`;
      else url += `&q=${encodeURIComponent(query)}`;
    }
    try {
      const res = await fetch(url, { credentials: 'include' });
      if (res.status === 401 || res.status === 403) { window.location.href = '/login'; return; }
      const data = await res.json();
      const items = data.result?.items || [];
      totalItems = data.result?.page?.totalItems || 0;
      totalPages = data.result?.page?.totalPages || 1;
      currentPage = page;
      document.getElementById('totalCount').textContent = totalItems.toLocaleString();
      renderTable(items);
      renderPagination();
    } catch {
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" style="text-align:center;padding:32px;color:#9ca3af;">데이터를 불러올 수 없습니다.</td></tr>';
    }
  }

  function loginTypeBadge(t) {
    if (!t) return '<span class="badge-login badge-normal">-</span>';
    const map = {
      normal: ['badge-normal', '보이데스크 가입'],
      google: ['badge-google', 'GOOGLE 가입'],
      kakao:  ['badge-kakao',  'KAKAO 가입'],
      naver:  ['badge-naver',  'NAVER 가입'],
      apple:  ['badge-apple',  'APPLE 가입'],
    };
    const [cls, label] = map[t.toLowerCase()] || ['badge-normal', t];
    return `<span class="badge-login ${cls}">${label}</span>`;
  }

  function fmtDate(d) {
    if (!d) return '-';
    return d.replace('T', ' ').slice(0, 19);
  }

  function renderTable(items) {
    if (!items.length) {
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" style="text-align:center;padding:32px;color:#9ca3af;">데이터 없음</td></tr>';
      return;
    }
    const offset = (currentPage - 1) * 20;
    document.getElementById('tableBody').innerHTML = items.map((u, i) => `
      <tr>
        <td style="color:#9ca3af;">${totalItems - offset - i}</td>
        <td>${loginTypeBadge(u.loginType)}</td>
        <td><a class="ip-link" href="mailto:${u.email}">${u.email || '-'}</a></td>
        <td>${u.userName || '-'}</td>
        <td>${u.phone || '-'}</td>
        <td><span class="ip-link">${u.joinIp || '-'}</span></td>
        <td style="color:#9ca3af;">${fmtDate(u.createdAt)}</td>
      </tr>`).join('');
  }

  function renderPagination() {
    const el = document.getElementById('pagination');
    if (totalPages <= 1) { el.innerHTML = ''; return; }
    let html = `<button class="btn-page" onclick="loadUsers(1)">«</button>`;
    html += `<button class="btn-page" onclick="loadUsers(${Math.max(1,currentPage-1)})">‹</button>`;
    const start = Math.max(1, currentPage - 2), end = Math.min(totalPages, currentPage + 2);
    for (let p = start; p <= end; p++) {
      html += `<button class="btn-page${p===currentPage?' active':''}" onclick="loadUsers(${p})">${p}</button>`;
    }
    html += `<button class="btn-page" onclick="loadUsers(${Math.min(totalPages,currentPage+1)})">›</button>`;
    html += `<button class="btn-page" onclick="loadUsers(${totalPages})">»</button>`;
    el.innerHTML = html;
  }

  function doSearch() { loadUsers(1); }

  loadUsers(1);
</script>
</body>
</html>
