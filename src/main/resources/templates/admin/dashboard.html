<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>대시보드 — Vdesk 관리자</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { font-family: 'DM Sans', 'Noto Sans KR', sans-serif; box-sizing: border-box; }
    body { background: #f8f9fa; }
    .kpi-card { background: #fff; border-radius: 12px; border: 1px solid #f0f0f0; padding: 22px 24px; }
    .delta-pos { background: #fef2f2; color: #ef4444; border-radius: 999px; padding: 2px 8px; font-size: 12px; font-weight: 600; }
    .delta-neg { background: #fef2f2; color: #ef4444; border-radius: 999px; padding: 2px 8px; font-size: 12px; font-weight: 600; }
    .delta-zero { background: #f3f4f6; color: #6b7280; border-radius: 999px; padding: 2px 8px; font-size: 12px; font-weight: 600; }
    .widget-card { background: #fff; border-radius: 12px; border: 1px solid #f0f0f0; padding: 20px 22px; }
    .section-title { font-size: 15px; font-weight: 700; color: #111; margin-bottom: 4px; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .admin-table th { text-align: left; padding: 10px 12px; color: #6b7280; font-weight: 600; font-size: 12px; border-bottom: 1px solid #f0f0f0; }
    .admin-table td { padding: 11px 12px; color: #374151; border-bottom: 1px solid #f9fafb; }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: #fafafa; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-blue { background: #eff6ff; color: #3b82f6; }
    .badge-purple { background: #faf5ff; color: #7c3aed; }
    .badge-orange { background: #fff7ed; color: #ea580c; }
    .refresh-btn { padding: 4px 10px; border: 1px solid #e5e7eb; border-radius: 6px; background: #fff; font-size: 12px; color: #6b7280; cursor: pointer; }
    .refresh-btn:hover { background: #f9fafb; }
    .more-btn { display: inline-flex; align-items: center; gap: 4px; padding: 5px 12px; border-radius: 6px; background: #ef4444; color: #fff; font-size: 12px; font-weight: 600; text-decoration: none; border: none; cursor: pointer; }
    .more-btn:hover { background: #dc2626; }
    .skeleton { background: linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
    @keyframes shimmer { from{background-position:200% 0}to{background-position:-200% 0} }
  </style>
</head>
<body style="display:flex;flex-direction:column;height:100vh;overflow:hidden;margin:0;">

  <!-- Content row -->
  <div style="display:flex;flex:1;overflow:hidden;">

    <!-- Sidebar -->
    <div th:replace="~{fragments/admin-sidebar :: sidebar('dashboard')}"></div>

    <!-- Main -->
    <main style="flex:1;overflow-y:auto;padding:28px 32px;">

    <!-- Page title -->
    <div style="margin-bottom:24px;">
      <h1 style="font-size:20px;font-weight:700;color:#111;margin:0 0 4px;">대시보드</h1>
      <p style="font-size:13px;color:#6b7280;margin:0;" id="today-date"></p>
    </div>

    <!-- KPI Cards -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;" id="kpi-grid">
      <!-- loading skeletons -->
      <div class="kpi-card skeleton" style="height:100px;"></div>
      <div class="kpi-card skeleton" style="height:100px;"></div>
      <div class="kpi-card skeleton" style="height:100px;"></div>
      <div class="kpi-card skeleton" style="height:100px;"></div>
    </div>

    <!-- Widgets Row -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px;">

      <!-- PC 관리 (donut) -->
      <div class="widget-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <span class="section-title">PC 관리</span>
          <button class="refresh-btn" onclick="loadPlanChart()">새로고침</button>
        </div>
        <div style="display:flex;justify-content:center;align-items:center;height:160px;">
          <canvas id="planChart" width="160" height="160"></canvas>
        </div>
        <div id="planLegend" style="display:flex;justify-content:center;gap:16px;margin-top:12px;font-size:12px;color:#6b7280;"></div>
        <div id="planCounts" style="display:flex;justify-content:space-around;margin-top:14px;padding-top:12px;border-top:1px solid #f5f5f5;"></div>
      </div>

      <!-- 월간 매출 (line) -->
      <div class="widget-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <span class="section-title">월간 매출</span>
          <button class="refresh-btn" onclick="loadSalesChart()">새로고침</button>
        </div>
        <div style="height:180px;">
          <canvas id="salesChart"></canvas>
        </div>
        <div id="salesStats" style="display:flex;justify-content:space-around;margin-top:12px;padding-top:12px;border-top:1px solid #f5f5f5;font-size:11px;color:#6b7280;"></div>
      </div>

      <!-- 월간 방문/가입 (line) -->
      <div class="widget-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <span class="section-title">월간 방문 / 가입</span>
          <button class="refresh-btn" onclick="loadVisitorChart()">새로고침</button>
        </div>
        <div style="height:180px;">
          <canvas id="visitorChart"></canvas>
        </div>
        <div style="display:flex;justify-content:center;gap:20px;margin-top:10px;font-size:11px;color:#6b7280;">
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#3b82f6;margin-right:4px;"></span>방문자수</span>
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#22c55e;margin-right:4px;"></span>회원가입수</span>
        </div>
      </div>
    </div>

    <!-- Tables Row -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">

      <!-- 회원 관리 -->
      <div class="widget-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <span class="section-title">회원 관리</span>
          <a href="/admin/users" class="more-btn">+ 전체보기</a>
        </div>
        <table class="admin-table">
          <thead>
            <tr>
              <th>번호</th>
              <th>아이디</th>
              <th>이메일</th>
              <th>가입자 IP 주소</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <tr><td colspan="4" style="text-align:center;padding:20px;color:#9ca3af;">불러오는 중...</td></tr>
          </tbody>
        </table>
        <div style="margin-top:12px;padding-top:10px;border-top:1px solid #f5f5f5;font-size:12px;color:#6b7280;">
          총 사용자 : <strong id="totalUsers" style="color:#111;">-</strong>명
        </div>
      </div>

      <!-- 결제 관리 -->
      <div class="widget-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <span class="section-title">결제 관리</span>
          <a href="/admin/payments" class="more-btn">+ 전체보기</a>
        </div>
        <table class="admin-table">
          <thead>
            <tr>
              <th>번호</th>
              <th>아이디</th>
              <th>이메일</th>
              <th>결제상품</th>
              <th>결제일</th>
            </tr>
          </thead>
          <tbody id="paymentTableBody">
            <tr><td colspan="5" style="text-align:center;padding:20px;color:#9ca3af;">불러오는 중...</td></tr>
          </tbody>
        </table>
        <div style="margin-top:12px;padding-top:10px;border-top:1px solid #f5f5f5;font-size:12px;color:#6b7280;">
          총 결제 건수 : <strong id="totalPayments" style="color:#111;">-</strong>건
        </div>
      </div>

    </div>

  </main>
  </div><!-- /content row -->

<script>
  // Date
  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

  // ── KPI ──────────────────────────────────────────────────
  async function loadKpi() {
    try {
      const res = await fetch('/api/admin/dashboard/summary', { credentials: 'include' });
      if (res.status === 401 || res.status === 403) { window.location.href = '/login'; return; }
      const data = await res.json();
      const c = data.result?.cards || {};
      renderKpi(c);
    } catch {
      renderKpiError();
    }
  }

  function fmtKrw(v) { return (v || 0).toLocaleString('ko-KR') + '원'; }
  function fmtDelta(d) {
    if (!d && d !== 0) return '';
    const cls = d > 0 ? 'delta-pos' : d < 0 ? 'delta-neg' : 'delta-zero';
    const sign = d > 0 ? '+' : '';
    return `<span class="${cls}">${sign}${d.toLocaleString()}</span>`;
  }

  function renderKpi(c) {
    const grid = document.getElementById('kpi-grid');
    const monthSales = c.weekSales?.krw?.value ?? 0;
    const monthDelta = c.weekSales?.krw?.delta ?? 0;
    const todaySales = c.todaySales?.krw?.value ?? 0;
    const todayDelta = c.todaySales?.krw?.delta ?? 0;
    const monthVisit = c.todayVisits?.value ?? 0;
    const monthVisitDelta = c.todayVisits?.delta ?? 0;
    const todayVisit = c.weekUsers?.value ?? 0;
    const todayVisitDelta = c.weekUsers?.delta ?? 0;

    grid.innerHTML = `
      <div class="kpi-card">
        <div style="font-size:13px;color:#6b7280;margin-bottom:8px;">월간매출</div>
        <div style="font-size:26px;font-weight:700;color:#111;margin-bottom:10px;">${fmtKrw(monthSales)}</div>
        <div style="display:flex;align-items:center;gap:6px;">${fmtDelta(monthDelta)} <span style="font-size:12px;color:#9ca3af;">지난달 대비</span></div>
      </div>
      <div class="kpi-card">
        <div style="font-size:13px;color:#6b7280;margin-bottom:8px;">당일매출</div>
        <div style="font-size:26px;font-weight:700;color:#111;margin-bottom:10px;">${fmtKrw(todaySales)}</div>
        <div style="display:flex;align-items:center;gap:6px;">${fmtDelta(todayDelta)} <span style="font-size:12px;color:#9ca3af;">어제 대비</span></div>
      </div>
      <div class="kpi-card">
        <div style="font-size:13px;color:#6b7280;margin-bottom:8px;">월간방문자</div>
        <div style="font-size:26px;font-weight:700;color:#111;margin-bottom:10px;">${monthVisit.toLocaleString()}명</div>
        <div style="display:flex;align-items:center;gap:6px;">${fmtDelta(monthVisitDelta)} <span style="font-size:12px;color:#9ca3af;">지난달 대비</span></div>
      </div>
      <div class="kpi-card">
        <div style="font-size:13px;color:#6b7280;margin-bottom:8px;">당일방문자</div>
        <div style="font-size:26px;font-weight:700;color:#111;margin-bottom:10px;">${todayVisit.toLocaleString()}명</div>
        <div style="display:flex;align-items:center;gap:6px;">${fmtDelta(todayVisitDelta)} <span style="font-size:12px;color:#9ca3af;">어제 대비</span></div>
      </div>`;
  }

  function renderKpiError() {
    document.getElementById('kpi-grid').innerHTML =
      '<div class="kpi-card" style="grid-column:1/-1;text-align:center;color:#9ca3af;padding:24px;">데이터를 불러올 수 없습니다.</div>';
  }

  // ── Plan Chart ────────────────────────────────────────────
  let planChartInst = null;
  async function loadPlanChart() {
    const today = new Date(); const y = today.getFullYear(), m = today.getMonth();
    const from = `${y}-${String(m+1).padStart(2,'0')}-01`;
    const to = `${y}-${String(m+1).padStart(2,'0')}-${String(new Date(y,m+1,0).getDate()).padStart(2,'0')}`;
    try {
      const res = await fetch(`/api/admin/dashboard/widgets/plan?from=${from}&to=${to}`, { credentials:'include' });
      const data = await res.json();
      const series = data.result?.series || data.series || [];
      const total = data.result?.total || data.total || 0;
      renderPlanChart(series, total);
    } catch {}
  }

  function renderPlanChart(series, total) {
    const colors = { BASIC: '#3b82f6', STANDARD: '#7c3aed', BUSINESS: '#f97316' };
    const labels = series.map(s => s.planType);
    const counts = series.map(s => s.count);
    const bgColors = labels.map(l => colors[l] || '#9ca3af');

    if (planChartInst) planChartInst.destroy();
    planChartInst = new Chart(document.getElementById('planChart'), {
      type: 'doughnut',
      data: { labels, datasets: [{ data: counts, backgroundColor: bgColors, borderWidth: 2, borderColor: '#fff' }] },
      options: {
        cutout: '65%', responsive: false, plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw}대` } }
        }
      },
      plugins: [{
        id: 'centerText',
        beforeDraw(chart) {
          const { ctx, chartArea: { left, right, top, bottom } } = chart;
          ctx.save();
          const cx = (left + right) / 2, cy = (top + bottom) / 2;
          ctx.font = '600 11px sans-serif'; ctx.fillStyle = '#9ca3af'; ctx.textAlign = 'center';
          ctx.fillText('전체', cx, cy - 8);
          ctx.font = '700 20px sans-serif'; ctx.fillStyle = '#111';
          ctx.fillText(total, cx, cy + 14);
          ctx.restore();
        }
      }]
    });

    const legend = document.getElementById('planLegend');
    const typeNames = { BASIC: '베이직', STANDARD: '스탠다드', BUSINESS: '비즈니스' };
    legend.innerHTML = series.map(s =>
      `<span style="display:flex;align-items:center;gap:4px;">
        <span style="width:8px;height:8px;border-radius:50%;background:${colors[s.planType]||'#9ca3af'};display:inline-block;"></span>
        ${typeNames[s.planType]||s.planType}
      </span>`
    ).join('');

    document.getElementById('planCounts').innerHTML = series.map(s =>
      `<div style="text-align:center;">
        <div style="font-size:11px;color:#9ca3af;margin-bottom:3px;">${typeNames[s.planType]||s.planType}</div>
        <div style="font-size:14px;font-weight:700;color:#111;">${s.count}대</div>
      </div>`
    ).join('');
  }

  // ── Sales Chart ───────────────────────────────────────────
  let salesChartInst = null;
  async function loadSalesChart() {
    const today = new Date(); const y = today.getFullYear();
    const from = `${y}-01-01`, to = `${y}-12-31`;
    try {
      const res = await fetch(`/api/admin/dashboard/widgets/sales/daily?from=${from}&to=${to}`, { credentials:'include' });
      const data = await res.json();
      const series = data.result?.series || [];
      renderSalesChart(series);
    } catch {}
  }

  function renderSalesChart(series) {
    // Group by month
    const monthly = {};
    for (let m = 1; m <= 12; m++) monthly[m] = 0;
    series.forEach(s => {
      const m = parseInt(s.date.split('-')[1]);
      monthly[m] += (s.krwAmount || 0);
    });
    const labels = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    const values = Object.values(monthly);
    const max = Math.max(...values, 0);
    const min = Math.min(...values.filter(v => v > 0), 0);

    if (salesChartInst) salesChartInst.destroy();
    salesChartInst = new Chart(document.getElementById('salesChart'), {
      type: 'line',
      data: {
        labels,
        datasets: [{ data: values, borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.05)',
          borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#3b82f6', tension: 0.3, fill: true }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.raw.toLocaleString()}원` } } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#9ca3af' } },
          y: { grid: { color: '#f5f5f5' }, ticks: { font: { size: 10 }, color: '#9ca3af', callback: v => v === 0 ? '0' : (v/10000).toFixed(0)+'만' } }
        }
      }
    });

    document.getElementById('salesStats').innerHTML = `
      <div style="text-align:center;"><div style="color:#9ca3af;font-size:10px;margin-bottom:2px;">월간 최대</div><div style="font-weight:700;color:#111;">${max.toLocaleString()}원</div></div>
      <div style="text-align:center;"><div style="color:#9ca3af;font-size:10px;margin-bottom:2px;">월간 최저</div><div style="font-weight:700;color:#111;">${min.toLocaleString()}원</div></div>
      <div style="text-align:center;"><div style="color:#9ca3af;font-size:10px;margin-bottom:2px;">평균 매출</div><div style="font-weight:700;color:#111;">${Math.round(values.reduce((a,b)=>a+b,0)/12).toLocaleString()}원</div></div>`;
  }

  // ── Visitor Chart ─────────────────────────────────────────
  let visitorChartInst = null;
  async function loadVisitorChart() {
    const today = new Date(); const y = today.getFullYear();
    const from = `${y}-01-01`, to = `${y}-12-31`;
    try {
      const res = await fetch(`/api/admin/dashboard/widgets/visitors/monthly?from=${from}&to=${to}&groupBy=MONTH`, { credentials:'include' });
      const data = await res.json();
      const series = data.result?.series || [];
      renderVisitorChart(series);
    } catch {}
  }

  function renderVisitorChart(series) {
    const monthly = {};
    const signups = {};
    for (let m = 1; m <= 12; m++) { monthly[m] = 0; signups[m] = 0; }
    series.forEach(s => {
      const m = parseInt(s.date.split('-')[1]);
      monthly[m] += (s.visitors || 0);
      signups[m] += (s.signups || 0);
    });
    const labels = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

    if (visitorChartInst) visitorChartInst.destroy();
    visitorChartInst = new Chart(document.getElementById('visitorChart'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: '방문자수', data: Object.values(monthly), borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.05)', borderWidth: 2, pointRadius: 3, tension: 0.3, fill: true },
          { label: '회원가입수', data: Object.values(signups), borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.05)', borderWidth: 2, pointRadius: 3, tension: 0.3, fill: true }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#9ca3af' } },
          y: { grid: { color: '#f5f5f5' }, ticks: { font: { size: 10 }, color: '#9ca3af' } }
        }
      }
    });
  }

  // ── Users Table ───────────────────────────────────────────
  async function loadUsers() {
    try {
      const res = await fetch('/api/admin/users?page=1&size=5', { credentials:'include' });
      const data = await res.json();
      const items = data.result?.items || [];
      const total = data.result?.page?.totalItems || 0;
      document.getElementById('totalUsers').textContent = total.toLocaleString();
      const typeLabel = t => {
        if (!t) return '-';
        const m = { normal:'보이데스크 가입', google:'구글 가입', kakao:'카카오 가입', naver:'네이버 가입', apple:'애플 가입' };
        return m[t.toLowerCase()] || t;
      };
      document.getElementById('userTableBody').innerHTML = items.length === 0
        ? '<tr><td colspan="4" style="text-align:center;padding:16px;color:#9ca3af;">데이터 없음</td></tr>'
        : items.map((u,i) => `
          <tr>
            <td>${total - i}</td>
            <td>
              <div style="font-weight:600;color:#374151;">${typeLabel(u.loginType)}</div>
              <div style="font-size:11px;color:#3b82f6;">SNS 가입</div>
            </td>
            <td style="color:#3b82f6;">${u.email || '-'}</td>
            <td style="color:#374151;">${u.joinIp || '-'}</td>
          </tr>`).join('');
    } catch {
      document.getElementById('userTableBody').innerHTML = '<tr><td colspan="4" style="text-align:center;padding:16px;color:#9ca3af;">불러오기 실패</td></tr>';
    }
  }

  // ── Payments Table ────────────────────────────────────────
  async function loadPayments() {
    try {
      const res = await fetch('/api/admin/payments?page=1&size=6', { credentials:'include' });
      const data = await res.json();
      const items = data.result?.items || [];
      const total = data.result?.page?.totalItems || 0;
      document.getElementById('totalPayments').textContent = total.toLocaleString();
      const planBadge = p => {
        const m = { BASIC_PLAN:'badge-blue', STANDARD_PLAN:'badge-purple', BUSINESS_PLAN:'badge-orange' };
        const n = { BASIC_PLAN:'베이직', STANDARD_PLAN:'스탠다드', BUSINESS_PLAN:'비즈니스' };
        return `<span class="badge ${m[p]||'badge-blue'}">${n[p]||p||'-'}</span>`;
      };
      const fmtDate = d => d ? d.replace('T',' ').slice(0,16) : '-';
      document.getElementById('paymentTableBody').innerHTML = items.length === 0
        ? '<tr><td colspan="5" style="text-align:center;padding:16px;color:#9ca3af;">데이터 없음</td></tr>'
        : items.map(p => `
          <tr>
            <td>${p.paymentId}</td>
            <td style="color:#374151;font-weight:500;">${p.email?.split('@')[0] || '-'}</td>
            <td style="color:#3b82f6;">${p.email || '-'}</td>
            <td>${planBadge(p.productCode)}</td>
            <td style="color:#9ca3af;">${fmtDate(p.paidAt)}</td>
          </tr>`).join('');
    } catch {
      document.getElementById('paymentTableBody').innerHTML = '<tr><td colspan="5" style="text-align:center;padding:16px;color:#9ca3af;">불러오기 실패</td></tr>';
    }
  }

  // Init
  loadKpi();
  loadPlanChart();
  loadSalesChart();
  loadVisitorChart();
  loadUsers();
  loadPayments();
</script>
</body>
</html>
