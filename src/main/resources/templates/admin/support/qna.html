<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Q&A — Vdesk 관리자</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'DM Sans', 'Noto Sans KR', sans-serif; box-sizing: border-box; }
    body { background: #f8f9fa; margin: 0; }
    .page-card { background: #fff; border-radius: 12px; border: 1px solid #f0f0f0; padding: 24px; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .admin-table th { text-align: left; padding: 11px 14px; color: #6b7280; font-weight: 600; font-size: 12px; border-bottom: 2px solid #f0f0f0; }
    .admin-table td { padding: 12px 14px; color: #374151; border-bottom: 1px solid #f9fafb; }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: #fafafa; }
    .search-input { padding: 7px 12px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 13px; outline: none; }
    .search-input:focus { border-color: #ef4444; }
    .search-select { padding: 7px 10px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 13px; background: #fff; cursor: pointer; }
    .btn-search { padding: 7px 16px; background: #ef4444; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-search:hover { background: #dc2626; }
    .btn-page { padding: 5px 10px; border: 1px solid #e5e7eb; border-radius: 6px; background: #fff; font-size: 12px; cursor: pointer; color: #374151; }
    .btn-page.active { background: #ef4444; color: #fff; border-color: #ef4444; }
    .btn-delete { padding: 4px 12px; background: #ef4444; color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-delete:hover { background: #dc2626; }
    .btn-answer { padding: 4px 12px; background: #3b82f6; color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-answer:hover { background: #2563eb; }
    .title-link { color: #374151; text-decoration: none; font-weight: 500; cursor: pointer; }
    .title-link:hover { color: #ef4444; }
    .badge-status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-open { background: #f3f4f6; color: #6b7280; }
    .badge-answered { background: #dcfce7; color: #16a34a; }
    /* Modal */
    .modal-bg { position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;transition:opacity 0.2s;pointer-events:none; }
    .modal-bg.open { opacity:1;pointer-events:all; }
    .modal-box { background:#fff;border-radius:14px;padding:28px;width:100%;max-width:580px;margin:1rem;transform:scale(0.96);transition:transform 0.2s;max-height:90vh;overflow-y:auto; }
    .modal-bg.open .modal-box { transform:scale(1); }
    .modal-textarea { width:100%;padding:9px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;outline:none;resize:vertical;min-height:100px; }
    .modal-textarea:focus { border-color:#3b82f6; }
    .detail-field { margin-bottom:14px; }
    .detail-label { font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;margin-bottom:4px; }
    .detail-value { font-size:13px;color:#374151;background:#f9fafb;padding:10px 12px;border-radius:8px;border:1px solid #f0f0f0; }
  </style>
</head>
<body>
<div style="display:flex;height:100vh;overflow:hidden;">
  <div th:replace="~{fragments/admin-sidebar :: sidebar('qna')}"></div>

  <main style="flex:1;overflow-y:auto;padding:28px 32px;">
    <div style="margin-bottom:20px;">
      <h1 style="font-size:20px;font-weight:700;color:#111;margin:0 0 4px;">Q&amp;A</h1>
      <p style="font-size:13px;color:#6b7280;margin:0;">사용자 1:1 문의를 조회하고 답변합니다.</p>
    </div>

    <div class="page-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;">
        <span style="font-size:15px;font-weight:700;color:#111;">문의 <span id="totalCount" style="color:#ef4444;">-</span>건</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <select id="searchField" class="search-select">
            <option value="TITLE">제목</option>
            <option value="CONTENT">내용</option>
            <option value="ALL">전체</option>
          </select>
          <input id="searchInput" class="search-input" type="text" placeholder="검색어를 입력해주세요." style="width:200px;"
                 onkeydown="if(event.key==='Enter')doSearch()"/>
          <button class="btn-search" onclick="doSearch()">검색</button>
        </div>
      </div>

      <table class="admin-table">
        <thead>
          <tr>
            <th style="width:60px;">번호</th>
            <th>제목</th>
            <th>작성인</th>
            <th>답변</th>
            <th style="width:80px;">삭제</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="5" style="text-align:center;padding:32px;color:#9ca3af;">불러오는 중...</td></tr>
        </tbody>
      </table>

      <div id="pagination" style="display:flex;align-items:center;justify-content:center;gap:4px;margin-top:18px;padding-top:14px;border-top:1px solid #f5f5f5;"></div>
    </div>
  </main>
</div>

<!-- Detail / Answer Modal -->
<div id="detailModal" class="modal-bg" onclick="if(event.target===this)closeDetailModal()">
  <div class="modal-box">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
      <h3 style="font-size:16px;font-weight:700;margin:0;">문의 상세 / 답변</h3>
      <button onclick="closeDetailModal()" style="background:none;border:none;cursor:pointer;color:#9ca3af;font-size:18px;">✕</button>
    </div>
    <div id="detailContent"></div>
    <div style="margin-top:16px;">
      <label style="font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:6px;">답변 내용 <span style="color:#ef4444;">*</span></label>
      <textarea id="answerContent" class="modal-textarea" placeholder="답변을 입력하세요."></textarea>
    </div>
    <p id="answerErr" style="color:#ef4444;font-size:12px;margin-top:6px;display:none;"></p>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button onclick="closeDetailModal()" style="flex:1;padding:10px;border:1.5px solid #e5e7eb;border-radius:8px;background:#fff;font-size:13px;cursor:pointer;">닫기</button>
      <button onclick="doAnswerDelete()" id="btnDeleteAnswer" style="padding:10px 16px;background:#f3f4f6;color:#6b7280;border:none;border-radius:8px;font-size:13px;cursor:pointer;display:none;">답변 삭제</button>
      <button onclick="doAnswer()" style="flex:2;padding:10px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">답변 등록/수정</button>
    </div>
  </div>
</div>

<script>
  let currentPage = 1, totalPages = 1, totalItems = 0;
  let currentPostId = null;
  let hasAnswer = false;

  async function loadPosts(page) {
    page = page || 1;
    const field = document.getElementById('searchField').value;
    const q = document.getElementById('searchInput').value.trim();
    let url = `/api/support/posts/list?type=INQUIRY&page=${page}&size=20`;
    if (q) url += `&q=${encodeURIComponent(q)}&field=${field}`;
    try {
      const res = await fetch(url, { credentials:'include' });
      if (res.status === 401 || res.status === 403) { window.location.href = '/login'; return; }
      const data = await res.json();
      const items = data.result?.items || [];
      totalItems = data.result?.totalItems || 0;
      totalPages = data.result?.totalPages || 1;
      currentPage = page;
      document.getElementById('totalCount').textContent = totalItems.toLocaleString();
      renderTable(items);
      renderPagination();
    } catch {
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" style="text-align:center;padding:32px;color:#9ca3af;">데이터를 불러올 수 없습니다.</td></tr>';
    }
  }

  function renderTable(items) {
    if (!items.length) {
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" style="text-align:center;padding:32px;color:#9ca3af;">데이터 없음</td></tr>';
      return;
    }
    const offset = (currentPage-1)*20;
    document.getElementById('tableBody').innerHTML = items.map((p,i) => `
      <tr>
        <td style="color:#9ca3af;">${totalItems - offset - i}</td>
        <td><span class="title-link" onclick="openDetail(${p.postId})">${p.title||'-'}</span></td>
        <td>${p.authorName||'-'}</td>
        <td><span class="badge-status ${p.status==='ANSWERED'?'badge-answered':'badge-open'}">${p.status==='ANSWERED'?'답변완료':'답변대기'}</span></td>
        <td><button class="btn-delete" onclick="deletePost(${p.postId})">삭제</button></td>
      </tr>`).join('');
  }

  function renderPagination() {
    const el = document.getElementById('pagination');
    if (totalPages <= 1) { el.innerHTML = ''; return; }
    let html = `<button class="btn-page" onclick="loadPosts(1)">«</button>`;
    html += `<button class="btn-page" onclick="loadPosts(${Math.max(1,currentPage-1)})">‹</button>`;
    const start = Math.max(1,currentPage-2), end = Math.min(totalPages,currentPage+2);
    for (let p = start; p <= end; p++) {
      html += `<button class="btn-page${p===currentPage?' active':''}" onclick="loadPosts(${p})">${p}</button>`;
    }
    html += `<button class="btn-page" onclick="loadPosts(${Math.min(totalPages,currentPage+1)})">›</button>`;
    html += `<button class="btn-page" onclick="loadPosts(${totalPages})">»</button>`;
    el.innerHTML = html;
  }

  function doSearch() { loadPosts(1); }

  async function openDetail(id) {
    currentPostId = id;
    document.getElementById('detailContent').innerHTML = '<div style="text-align:center;padding:20px;color:#9ca3af;">불러오는 중...</div>';
    document.getElementById('answerContent').value = '';
    document.getElementById('answerErr').style.display = 'none';
    document.getElementById('detailModal').classList.add('open');
    try {
      const res = await fetch(`/api/support/posts/detail/${id}`, { credentials:'include' });
      const data = await res.json();
      const post = data.result?.post || {};
      const inquiry = data.result?.inquiry || {};
      hasAnswer = !!inquiry.answer;
      document.getElementById('btnDeleteAnswer').style.display = hasAnswer ? 'block' : 'none';
      if (hasAnswer) document.getElementById('answerContent').value = inquiry.answer;
      document.getElementById('detailContent').innerHTML = `
        <div class="detail-field"><div class="detail-label">제목</div><div class="detail-value">${post.title||'-'}</div></div>
        <div class="detail-field"><div class="detail-label">내용</div><div class="detail-value" style="white-space:pre-wrap;">${post.content||'-'}</div></div>
        <div style="display:flex;gap:12px;">
          <div class="detail-field" style="flex:1;"><div class="detail-label">작성자</div><div class="detail-value">${post.author?.userName||'-'}</div></div>
          <div class="detail-field" style="flex:1;"><div class="detail-label">작성일</div><div class="detail-value">${post.createdAt?post.createdAt.slice(0,16):'-'}</div></div>
        </div>
        ${inquiry.email ? `<div style="display:flex;gap:12px;"><div class="detail-field" style="flex:1;"><div class="detail-label">이메일</div><div class="detail-value">${inquiry.email}</div></div><div class="detail-field" style="flex:1;"><div class="detail-label">카테고리</div><div class="detail-value">${inquiry.category||'-'}</div></div></div>` : ''}`;
    } catch {
      document.getElementById('detailContent').innerHTML = '<div style="text-align:center;padding:20px;color:#ef4444;">불러오기 실패</div>';
    }
  }

  function closeDetailModal() {
    document.getElementById('detailModal').classList.remove('open');
    currentPostId = null;
  }

  async function doAnswer() {
    const answer = document.getElementById('answerContent').value.trim();
    const err = document.getElementById('answerErr');
    if (!answer) { err.textContent = '답변 내용을 입력하세요.'; err.style.display = 'block'; return; }
    const url = hasAnswer
      ? `/api/support/posts/answer/update/${currentPostId}`
      : `/api/support/posts/answer/register/${currentPostId}`;
    const method = hasAnswer ? 'PATCH' : 'POST';
    try {
      const res = await fetch(url, {
        method, credentials:'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ answer, notify: false })
      });
      const data = await res.json();
      if (res.ok) { closeDetailModal(); loadPosts(currentPage); }
      else { err.textContent = data.message || '처리 실패'; err.style.display = 'block'; }
    } catch { err.textContent = '서버와 연결할 수 없습니다.'; err.style.display = 'block'; }
  }

  async function doAnswerDelete() {
    if (!confirm('답변을 삭제하시겠습니까?')) return;
    const res = await fetch(`/api/support/posts/answer/delete/${currentPostId}`, { method:'DELETE', credentials:'include' });
    if (res.ok) { closeDetailModal(); loadPosts(currentPage); }
    else alert('삭제 실패');
  }

  async function deletePost(id) {
    if (!confirm('삭제 하시겠습니까?')) return;
    const res = await fetch(`/api/support/posts/delete/${id}`, { method:'DELETE', credentials:'include' });
    if (res.ok) loadPosts(currentPage);
    else alert('삭제 실패');
  }

  loadPosts(1);
</script>
</body>
</html>
