<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

<header th:fragment="header(activePage)"
        style="position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #f0f0f0;">
  <div style="max-width:1280px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:64px;">

    <!-- Logo + Nav -->
    <div style="display:flex;align-items:center;gap:2.5rem;">
      <a href="/" style="display:flex;align-items:center;gap:8px;text-decoration:none;">
        <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="7" fill="#ef4444"/>
          <path d="M7 9h14M7 14h10M7 19h6" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
        <span style="font-size:1.15rem;font-weight:700;color:#111;">Vdesk</span>
      </a>

      <nav style="display:flex;align-items:center;gap:0.1rem;" class="landing-nav">
        <a href="/intro"
           th:classappend="${activePage == 'intro'} ? ' nav-active' : ''"
           class="nav-link">소개</a>
        <a href="/pricing"
           th:classappend="${activePage == 'pricing'} ? ' nav-active' : ''"
           class="nav-link">구매하기</a>
        <a href="/method"
           th:classappend="${activePage == 'method'} ? ' nav-active' : ''"
           class="nav-link">사용방법</a>
        <a href="/#usecase"
           th:classappend="${activePage == 'usecase'} ? ' nav-active' : ''"
           class="nav-link">활용사례</a>
        <a href="/support"
           th:classappend="${activePage == 'support'} ? ' nav-active' : ''"
           class="nav-link">고객센터</a>
      </nav>
    </div>

    <!-- Right buttons (JS로 auth 상태 반영) -->
    <div style="display:flex;align-items:center;gap:0.6rem;">
      <!-- 비로그인 상태 -->
      <div id="nav-guest" style="display:flex;align-items:center;gap:0.5rem;">
        <a href="/login" class="nav-btn-outline">로그인</a>
        <a href="/signup" class="nav-btn-red">회원가입</a>
      </div>
      <!-- 로그인 상태 -->
      <div id="nav-auth" style="display:none;align-items:center;gap:0.5rem;">
        <button onclick="doLogout()" class="nav-btn-ghost">로그아웃</button>
        <a href="/mypage" class="nav-btn-outline">마이페이지</a>
        <a href="/dashboard" class="nav-btn-red">접속기</a>
      </div>

      <!-- 모바일 햄버거 -->
      <button id="mobMenuBtn" onclick="toggleMobMenu()" class="mob-hamburger" aria-label="메뉴">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <!-- 모바일 드롭다운 -->
  <div id="mobMenu" style="display:none;border-top:1px solid #f0f0f0;background:#fff;">
    <nav style="padding:1rem 1.5rem;display:flex;flex-direction:column;gap:0.25rem;">
      <a href="/intro"    class="mob-nav-link">소개</a>
      <a href="/pricing"  class="mob-nav-link">구매하기</a>
      <a href="/method"   class="mob-nav-link">사용방법</a>
      <a href="/#usecase" class="mob-nav-link">활용사례</a>
      <a href="/support"  class="mob-nav-link">고객센터</a>
      <hr style="border:none;border-top:1px solid #f3f4f6;margin:0.5rem 0;"/>
      <div id="mob-guest">
        <a href="/login"  class="mob-nav-link">로그인</a>
        <a href="/signup" class="mob-nav-link">회원가입</a>
      </div>
      <div id="mob-auth" style="display:none;">
        <a href="/dashboard" class="mob-nav-link" style="color:#ef4444;font-weight:600;">접속기</a>
        <a href="/mypage"    class="mob-nav-link">마이페이지</a>
        <button onclick="doLogout()" class="mob-nav-link" style="text-align:left;background:none;border:none;cursor:pointer;width:100%;color:#6b7280;">로그아웃</button>
      </div>
    </nav>
  </div>
</header>

<style>
  * { font-family: 'DM Sans', 'Noto Sans KR', sans-serif; box-sizing: border-box; }
  .nav-link {
    padding: 0.5rem 0.85rem;
    font-size: 0.9rem; font-weight: 500;
    color: #4b5563; text-decoration: none;
    border-radius: 6px; transition: color 0.15s, background 0.15s;
    position: relative;
  }
  .nav-link:hover { color: #111; background: #f9fafb; }
  .nav-link.nav-active { color: #ef4444; font-weight: 600; }
  .nav-link.nav-active::after {
    content: ''; position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
    width: 24px; height: 2px; background: #ef4444; border-radius: 1px;
  }
  .nav-btn-outline {
    padding: 0.45rem 1rem; border: 1.5px solid #e5e7eb; border-radius: 7px;
    font-size: 0.875rem; font-weight: 500; color: #374151; text-decoration: none;
    transition: border-color 0.15s;
  }
  .nav-btn-outline:hover { border-color: #d1d5db; }
  .nav-btn-red {
    padding: 0.45rem 1rem; background: #ef4444; border-radius: 7px;
    font-size: 0.875rem; font-weight: 600; color: #fff; text-decoration: none;
    transition: background 0.15s;
  }
  .nav-btn-red:hover { background: #dc2626; }
  .nav-btn-ghost {
    padding: 0.45rem 0.75rem; border: none; background: none; cursor: pointer;
    font-size: 0.875rem; font-weight: 500; color: #6b7280;
    transition: color 0.15s;
  }
  .nav-btn-ghost:hover { color: #374151; }
  .mob-hamburger {
    display: none; flex-direction: column; gap: 5px; padding: 4px; background: none; border: none; cursor: pointer;
  }
  .mob-hamburger span { display: block; width: 22px; height: 2px; background: #374151; border-radius: 2px; }
  .mob-nav-link {
    display: block; padding: 0.6rem 0.5rem;
    font-size: 0.9rem; font-weight: 500; color: #374151; text-decoration: none;
    border-radius: 6px; transition: background 0.12s;
  }
  .mob-nav-link:hover { background: #f9fafb; }
  @media (max-width: 768px) {
    .landing-nav { display: none !important; }
    #nav-guest, #nav-auth { display: none !important; }
    .mob-hamburger { display: flex !important; }
  }
</style>

<script>
  (async function checkAuth() {
    try {
      const res = await fetch('/api/auth/me', { credentials: 'include' });
      if (res.ok) {
        document.getElementById('nav-guest').style.display = 'none';
        document.getElementById('nav-auth').style.display = 'flex';
        document.getElementById('mob-guest').style.display = 'none';
        document.getElementById('mob-auth').style.display = 'block';
      }
    } catch {}
  })();

  function toggleMobMenu() {
    const m = document.getElementById('mobMenu');
    m.style.display = m.style.display === 'none' ? 'block' : 'none';
  }

  async function doLogout() {
    await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
    window.location.href = '/';
  }
</script>

</body>
</html>
