<header xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
        th:fragment="header(activePage)"
        class="sticky top-0 z-[100] bg-white border-b border-gray-100">
  <div class="max-w-[1280px] mx-auto px-6 flex items-center justify-between h-16">

    <!-- Logo + Nav -->
    <div class="flex items-center gap-10">
      <a href="/" class="flex items-center gap-2 no-underline">
        <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="7" fill="#ef4444"/>
          <path d="M7 9h14M7 14h10M7 19h6" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
        <span class="text-[18px] font-bold text-[#111]">Vdesk</span>
      </a>

      <nav class="flex items-center gap-1.5 landing-nav">
        <a href="/intro"
           th:classappend="${activePage == 'intro'} ? ' nav-active' : ''"
           class="nav-link">소개</a>
        <a href="/pricing"
           th:classappend="${activePage == 'pricing'} ? ' nav-active' : ''"
           class="nav-link">구매하기</a>
        <a href="/method"
           th:classappend="${activePage == 'method'} ? ' nav-active' : ''"
           class="nav-link">사용방법</a>
        <a href="/usecase"
           th:classappend="${activePage == 'usecase'} ? ' nav-active' : ''"
           class="nav-link">활용사례</a>
        <a href="/support"
           th:classappend="${activePage == 'support'} ? ' nav-active' : ''"
           class="nav-link">고객센터</a>
      </nav>
    </div>

    <!-- Right buttons -->
    <div class="flex items-center gap-2.5">

      <!-- 비로그인 -->
      <div sec:authorize="!isAuthenticated()" class="flex items-center gap-2">
        <a href="/login"
           class="px-4 py-[7px] border border-[#e5e7eb] border-[1.5px] rounded-[7px] text-[14px] font-medium text-[#374151] no-underline bg-white hover:border-[#d1d5db] transition-colors">
          로그인
        </a>
        <a href="/signup"
           class="px-4 py-[7px] bg-[#ef4444] rounded-[7px] text-[14px] font-semibold text-white no-underline hover:bg-[#dc2626] transition-colors border-0">
          회원가입
        </a>
      </div>

      <!-- 로그인 - 일반 사용자 -->
      <div sec:authorize="isAuthenticated() and !hasRole('ROLE_ADMIN')" class="flex items-center gap-2">
        <button onclick="doLogout()"
                class="px-3 py-[7px] border-0 bg-transparent cursor-pointer text-[14px] font-medium text-[#6b7280] hover:text-[#374151] transition-colors">
          로그아웃
        </button>
        <a href="/mypage"
           class="px-4 py-[7px] border border-[#e5e7eb] border-[1.5px] rounded-[7px] text-[14px] font-medium text-[#374151] no-underline bg-white hover:border-[#d1d5db] transition-colors">
          마이페이지
        </a>
        <a href="/dashboard"
           class="px-4 py-[7px] bg-[#ef4444] rounded-[7px] text-[14px] font-semibold text-white no-underline hover:bg-[#dc2626] transition-colors border-0">
          접속기
        </a>
      </div>

      <!-- 로그인 - 관리자 -->
      <div sec:authorize="hasRole('ROLE_ADMIN')" class="flex items-center gap-2">
        <button onclick="doLogout()"
                class="px-3 py-[7px] border-0 bg-transparent cursor-pointer text-[14px] font-medium text-[#6b7280] hover:text-[#374151] transition-colors">
          로그아웃
        </button>
        <a href="/admin"
           class="px-4 py-[7px] border border-[#e5e7eb] border-[1.5px] rounded-[7px] text-[14px] font-medium text-[#374151] no-underline bg-white hover:border-[#d1d5db] transition-colors">
          관리자 페이지
        </a>
      </div>

      <!-- 모바일 햄버거 -->
      <button id="mobMenuBtn" onclick="toggleMobMenu()"
              class="hidden flex-col gap-[5px] p-1 bg-transparent border-0 cursor-pointer mob-hamburger-btn"
              aria-label="메뉴">
        <span class="block w-[22px] h-[2px] bg-[#374151] rounded-[2px]"></span>
        <span class="block w-[22px] h-[2px] bg-[#374151] rounded-[2px]"></span>
        <span class="block w-[22px] h-[2px] bg-[#374151] rounded-[2px]"></span>
      </button>
    </div>
  </div>

  <!-- 모바일 드롭다운 -->
  <div id="mobMenu" style="display:none" class="border-t border-gray-100 bg-white">
    <nav class="px-6 py-4 flex flex-col gap-1">
      <a href="/intro"   class="block px-2 py-2 text-[15px] font-medium text-[#374151] no-underline rounded-md hover:bg-gray-50 transition-colors">소개</a>
      <a href="/pricing" class="block px-2 py-2 text-[15px] font-medium text-[#374151] no-underline rounded-md hover:bg-gray-50 transition-colors">구매하기</a>
      <a href="/method"  class="block px-2 py-2 text-[15px] font-medium text-[#374151] no-underline rounded-md hover:bg-gray-50 transition-colors">사용방법</a>
      <a href="/usecase" class="block px-2 py-2 text-[15px] font-medium text-[#374151] no-underline rounded-md hover:bg-gray-50 transition-colors">활용사례</a>
      <a href="/support" class="block px-2 py-2 text-[15px] font-medium text-[#374151] no-underline rounded-md hover:bg-gray-50 transition-colors">고객센터</a>
      <hr class="border-none border-t border-gray-100 my-2"/>

      <!-- 모바일 비로그인 -->
      <div sec:authorize="!isAuthenticated()">
        <a href="/login"  class="block px-2 py-2 text-[15px] font-medium text-[#374151] no-underline rounded-md hover:bg-gray-50 transition-colors">로그인</a>
        <a href="/signup" class="block px-2 py-2 text-[15px] font-medium text-[#374151] no-underline rounded-md hover:bg-gray-50 transition-colors">회원가입</a>
      </div>

      <!-- 모바일 로그인 - 일반 사용자 -->
      <div sec:authorize="isAuthenticated() and !hasRole('ROLE_ADMIN')">
        <a href="/dashboard" class="block px-2 py-2 text-[15px] font-semibold text-[#ef4444] no-underline rounded-md hover:bg-gray-50 transition-colors">접속기</a>
        <a href="/mypage"    class="block px-2 py-2 text-[15px] font-medium text-[#374151] no-underline rounded-md hover:bg-gray-50 transition-colors">마이페이지</a>
        <button onclick="doLogout()"
                class="block w-full text-left px-2 py-2 text-[15px] font-medium text-[#6b7280] bg-transparent border-0 cursor-pointer rounded-md hover:bg-gray-50 transition-colors">
          로그아웃
        </button>
      </div>

      <!-- 모바일 로그인 - 관리자 -->
      <div sec:authorize="hasRole('ROLE_ADMIN')">
        <a href="/admin"  class="block px-2 py-2 text-[15px] font-semibold text-[#ef4444] no-underline rounded-md hover:bg-gray-50 transition-colors">관리자 페이지</a>
        <button onclick="doLogout()"
                class="block w-full text-left px-2 py-2 text-[15px] font-medium text-[#6b7280] bg-transparent border-0 cursor-pointer rounded-md hover:bg-gray-50 transition-colors">
          로그아웃
        </button>
      </div>
    </nav>
  </div>

  <style>
    * { font-family: 'DM Sans', 'Noto Sans KR', sans-serif; box-sizing: border-box; }

    .nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 40px;
      padding: 0 16px;
      font-size: 15px;
      font-weight: 600;
      color: #4b5563;
      text-decoration: none;
      border-radius: 8px;
      transition: color 0.15s, background 0.15s;
      position: relative;
      line-height: 1;
    }

    .nav-link:hover { color: #111; background: #fff; }

    .nav-link::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: 6px;
      transform: translateX(-50%) scaleX(0);
      transform-origin: center;
      width: 22px;
      height: 2px;
      background: #111;
      border-radius: 1px;
      transition: transform 0.18s, background 0.18s, width 0.18s;
      opacity: 0.9;
    }

    .nav-link:hover::after {
      transform: translateX(-50%) scaleX(1);
    }

    .nav-link.nav-active { color: #ef4444; font-weight: 600; }

    .nav-link.nav-active::after {
      width: 26px;
      background: #ef4444;
      transform: translateX(-50%) scaleX(1);
    }

    @media (max-width: 768px) {
      .landing-nav { display: none !important; }
      .mob-hamburger-btn { display: flex !important; }
    }
  </style>

  <script>
    function toggleMobMenu() {
      var m = document.getElementById('mobMenu');
      if (!m) return;
      m.style.display = m.style.display === 'none' ? 'block' : 'none';
    }

    async function doLogout() {
      try { await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }); } catch {}
      localStorage.removeItem('vdesk_auth');
      window.location.href = '/';
    }
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
</header>
