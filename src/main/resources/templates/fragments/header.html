<header xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
        th:fragment="header(activePage)">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; }

    .container1 { max-width: 1200px; margin: 0 auto; width: 95%; }

    /* 헤더 fixed로 인한 본문 밀림 방지 — 히어로 없는 페이지에서 사용 */
    .contents_wrap { padding-top: 70px; }

    /* ── 헤더 ── */
    .haeader {
      background: #fff;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      border-bottom: 1px solid #f0f0f0;
    }
    .haeader > .container1 {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .haeader a {
      display: inline-block;
      font-size: 16px;
      color: #333;
      font-weight: 400;
      padding: 20px 0;
      text-decoration: none;
    }
    .haeader a img { width: 100%; display: block; height: auto; }
    .haeader .logo a { margin-top: 3px; }

    /* ── 왼쪽: 로고 + 네비 ── */
    .menu_left { display: flex; align-items: center; }

    .menu_wrap ul {
      display: flex;
      justify-content: flex-start;
      margin-left: 75px;
      padding: 0; list-style: none;
    }
    .menu_wrap ul li a {
      margin-right: 40px;
      position: relative;
    }
    .menu_wrap ul li:last-child a { margin-right: 0; }
    .menu_wrap ul li a::after {
      content: "";
      width: 120%;
      height: 3px;
      background: #F44336;
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
    }
    .menu_wrap ul li:hover a::after { display: block; }
    .menu_wrap ul li.on a { color: #F44336; }
    .menu_wrap ul li.on a::after { display: block; }

    /* ── 오른쪽: 로그인/가입/접속기 ── */
    .menu_right.menu_wrap ul {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      margin-right: 0;
      margin-left: 0;
    }
    .menu_right.menu_wrap ul li a,
    .menu_right.menu_wrap ul li button {
      margin-right: 0;
      display: block;
      padding: 5px 15px;
      font-size: 14px;
      border-radius: 99px;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }
    .menu_right.menu_wrap ul li a::after,
    .menu_right.menu_wrap ul li button::after { display: none !important; }

    .nav_login_btn_pc {
      background-color: #F44336; color: #fff;
      border: 1px solid transparent !important;
      transition: background-color 0.3s ease;
    }
    .nav_login_btn_pc:hover { background-color: #d43326 !important; }

    .nav_join_btn_pc {
      background-color: #fff; color: #F44336;
      border: 1px solid #F44336 !important;
      transition: background-color 0.3s ease;
    }
    .nav_join_btn_pc:hover { background-color: #F44336 !important; color: #fff !important; }

    .logout_btn_pc {
      background-color: #e9e9e9 !important; color: #5F6368 !important;
      transition: background-color 0.3s ease;
    }
    .logout_btn_pc:hover { background-color: #d9d9d9 !important; }

    .mypage_btn_pc {
      background-color: #e9e9e9 !important; color: #5F6368 !important;
      transition: background-color 0.3s ease;
    }
    .mypage_btn_pc:hover { background-color: #d9d9d9 !important; }

    .vdesk_btn_pc {
      background-color: #F44336 !important; color: #fff !important;
      border: 1px solid transparent !important;
      transition: background-color 0.3s ease;
    }
    .vdesk_btn_pc:hover { background-color: #d43326 !important; }

    /* ── 모바일 내비 ── */
    .mb_nav { display: none; }

    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 36px; height: 36px;
      cursor: pointer;
      padding: 6px;
      background: transparent;
      border: none;
    }
    .hamburger span {
      display: block;
      width: 22px; height: 2px;
      background: #374151;
      border-radius: 2px;
      transition: all 0.3s ease;
    }
    .hamburger.on span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.on span:nth-child(2) { opacity: 0; }
    .hamburger.on span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ── 모바일 사이드 메뉴 ── */
    .mob_nav {
      position: fixed;
      top: 0; right: -300px;
      width: 280px; height: 100vh;
      background: #fff;
      z-index: 999;
      box-shadow: -4px 0 20px rgba(0,0,0,.12);
      transition: right 0.35s cubic-bezier(.16,1,.3,1);
      display: flex; flex-direction: column;
      overflow-y: auto;
    }
    .mb_nav.on .mob_nav { right: 0; }
    .modal_bg {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 998;
    }
    .mb_nav.on .modal_bg { display: block; }

    .mob_nav_top {
      padding: 20px 20px 16px;
      border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center;
    }
    .mob_nav_top .logo { width: 80px; }
    .mob_nav_top .logo img { width: 100%; height: auto; }

    .mob_nav_mid {
      display: flex; gap: 8px;
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
    }
    .mob_nav_mid a,
    .mob_nav_mid button {
      flex: 1;
      display: block;
      text-align: center;
      padding: 8px 0;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
    }
    .mob_login_btn  { background: #F44336; color: #fff; border: none; }
    .mob_join_btn   { border: 1px solid #F44336; color: #F44336; background: #fff; }
    .mob_logout_btn { background: #e9e9e9; color: #5F6368; border: none; }
    .mob_mypage_btn { background: #e9e9e9; color: #5F6368; border: none; }

    .mob_nav_bottom {
      padding: 12px 20px;
      border-bottom: 1px solid #f0f0f0;
    }
    .mob_nav_bottom a {
      display: block;
      text-align: center;
      padding: 10px;
      background: #F44336;
      color: #fff;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }

    .mob_con { padding: 8px 0; }
    .mob_con ul { padding: 0; list-style: none; margin: 0; }
    .mob_con ul li a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      font-size: 15px;
      color: #333;
      text-decoration: none;
      border-bottom: 1px solid #f5f5f5;
      font-weight: 500;
    }
    .mob_con ul li a:hover { background: #fafafa; color: #F44336; }
    .mob_con ul li a i { font-size: 12px; color: #aaa; }

    @media (max-width: 768px) {
      .menu_left nav,
      .menu_right { display: none !important; }
      .hamburger { display: flex !important; }
      .mb_nav { display: block; }
    }
  </style>

  <!-- ── PC 헤더 ── -->
  <div class="haeader">
    <div class="container1">

      <!-- 왼쪽: 로고 + 네비 -->
      <div class="menu_left">
        <div class="logo">
          <a href="/">
            <img th:src="@{/assets/images/wide_logo.svg}" src="/assets/images/wide_logo.svg"
                 alt="브이데스크 로고" style="height:32px; width:auto;"/>
          </a>
        </div>
        <div class="menu_wrap">
          <ul>
            <li th:classappend="${activePage == 'intro'}    ? 'on' : ''"><a href="/intro">소개</a></li>
            <li th:classappend="${activePage == 'pricing'}  ? 'on' : ''"><a href="/pricing">구매하기</a></li>
            <li th:classappend="${activePage == 'method'}   ? 'on' : ''"><a href="/method">사용방법</a></li>
            <li th:classappend="${activePage == 'usecase'}  ? 'on' : ''"><a href="javascript:void(0);" onclick="scrollToUseCase()">활용사례</a></li>
            <li th:classappend="${activePage == 'support'}  ? 'on' : ''"><a href="/support">고객센터</a></li>
          </ul>
        </div>
      </div>

      <!-- 오른쪽: 인증 버튼 -->
      <div class="menu_right menu_wrap">
        <ul>
          <!-- 비로그인 -->
          <li sec:authorize="!isAuthenticated()">
            <a href="/login" class="nav_login_btn_pc">로그인</a>
          </li>
          <li sec:authorize="!isAuthenticated()">
            <a href="/signup" class="nav_join_btn_pc">회원가입</a>
          </li>

          <!-- 로그인 - 일반 사용자 -->
          <li sec:authorize="isAuthenticated() and !hasRole('ROLE_ADMIN')">
            <button class="logout_btn_pc" onclick="doLogout()">로그아웃</button>
          </li>
          <li sec:authorize="isAuthenticated() and !hasRole('ROLE_ADMIN')">
            <a href="/mypage" class="mypage_btn_pc">마이페이지</a>
          </li>
          <li sec:authorize="isAuthenticated() and !hasRole('ROLE_ADMIN')">
            <a href="/dashboard" class="vdesk_btn_pc">접속기</a>
          </li>

          <!-- 로그인 - 관리자 -->
          <li sec:authorize="hasRole('ROLE_ADMIN')">
            <button class="logout_btn_pc" onclick="doLogout()">로그아웃</button>
          </li>
          <li sec:authorize="hasRole('ROLE_ADMIN')">
            <a href="/admin" class="mypage_btn_pc">관리자 페이지</a>
          </li>
        </ul>
      </div>

      <!-- 모바일 햄버거 -->
      <button class="hamburger" id="hamburgerBtn" aria-label="메뉴" onclick="toggleMobNav()">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <!-- ── 모바일 사이드 메뉴 ── -->
  <div class="mb_nav" id="mbNav">
    <div class="modal_bg" onclick="closeMobNav()"></div>
    <div class="mob_nav">

      <!-- 상단 로고 -->
      <div class="mob_nav_top">
        <div class="logo">
          <img th:src="@{/assets/images/wide_logo.svg}" src="/assets/images/wide_logo.svg" alt="브이데스크"/>
        </div>
      </div>

      <!-- 로그인/가입 or 로그아웃/마이페이지 -->
      <div class="mob_nav_mid">
        <!-- 비로그인 -->
        <a sec:authorize="!isAuthenticated()" href="/login"  class="mob_login_btn">로그인</a>
        <a sec:authorize="!isAuthenticated()" href="/signup" class="mob_join_btn">회원가입</a>
        <!-- 일반 사용자 -->
        <button sec:authorize="isAuthenticated() and !hasRole('ROLE_ADMIN')" class="mob_logout_btn" onclick="doLogout()">로그아웃</button>
        <a      sec:authorize="isAuthenticated() and !hasRole('ROLE_ADMIN')" href="/mypage" class="mob_mypage_btn">마이페이지</a>
        <!-- 관리자 -->
        <button sec:authorize="hasRole('ROLE_ADMIN')" class="mob_logout_btn" onclick="doLogout()">로그아웃</button>
        <a      sec:authorize="hasRole('ROLE_ADMIN')" href="/admin" class="mob_mypage_btn">관리자</a>
      </div>

      <!-- 접속기 버튼 (로그인 시) -->
      <div sec:authorize="isAuthenticated() and !hasRole('ROLE_ADMIN')" class="mob_nav_bottom">
        <a href="/dashboard">접속기 바로가기</a>
      </div>

      <!-- 메뉴 링크 -->
      <div class="mob_con">
        <ul>
          <li><a href="/intro">소개<i class="xi-angle-right"></i></a></li>
          <li><a href="/pricing">구매하기<i class="xi-angle-right"></i></a></li>
          <li><a href="/method">사용방법<i class="xi-angle-right"></i></a></li>
          <li><a href="javascript:void(0);" onclick="scrollToUseCase(); closeMobNav();">활용사례<i class="xi-angle-right"></i></a></li>
          <li><a href="/support">고객센터<i class="xi-angle-right"></i></a></li>
        </ul>
      </div>
    </div>
  </div>

  <script>
    /* ── 모바일 메뉴 토글 ── */
    function toggleMobNav() {
      var nav = document.getElementById('mbNav');
      var btn = document.getElementById('hamburgerBtn');
      if (!nav) return;
      var isOpen = nav.classList.contains('on');
      if (isOpen) { closeMobNav(); } else {
        nav.classList.add('on');
        btn && btn.classList.add('on');
        document.body.style.overflow = 'hidden';
      }
    }
    function closeMobNav() {
      var nav = document.getElementById('mbNav');
      var btn = document.getElementById('hamburgerBtn');
      if (nav) nav.classList.remove('on');
      if (btn) btn.classList.remove('on');
      document.body.style.overflow = '';
    }

    /* ── 로그아웃 ── */
    async function doLogout() {
      try { await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }); } catch(e) {}
      localStorage.removeItem('vdesk_auth');
      window.location.href = '/';
    }

    /* ── 맨 위로 스크롤 ── */
    function setRightToTop() {
      var btn = document.querySelector('.scroll_box_top');
      if (btn) btn.addEventListener('click', function() {
        window.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
      });
    }

    /* ── 모바일 하단 센터 버튼 ── */
    function setMobileBottomMenu() {
      var controllers = document.querySelectorAll('.menu_center_box > div');
      if (controllers.length < 2) return;
      controllers[1].addEventListener('click', function() {
        window.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
      });
      window.addEventListener('scroll', function() {
        if (window.scrollY > 100) {
          controllers[1].classList.add('on');
          controllers[0].classList.remove('on');
        } else {
          controllers[0].classList.add('on');
          controllers[1].classList.remove('on');
        }
      }, { passive: true });
    }

    /* ── 활용사례 / 인트로 섹션 스크롤 ── */
    function scrollToUseCase() {
      if (window.location.pathname !== '/') {
        localStorage.setItem('moveUseCase', 'true');
        window.location.href = '/';
      } else {
        scrollToUseCaseSection();
      }
    }
    function scrollToUseCaseSection() {
      var el = document.getElementById('useCaseWrap');
      if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 100, behavior: 'smooth' });
    }
    function scrollToIntroduction() {
      if (window.location.pathname !== '/') {
        localStorage.setItem('moveIntro', 'true');
        window.location.href = '/';
      } else {
        var el = document.querySelector('.introduction');
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    /* ── DOMContentLoaded ── */
    document.addEventListener('DOMContentLoaded', function() {
      setRightToTop();
      setMobileBottomMenu();

      if (localStorage.getItem('moveUseCase') === 'true') {
        localStorage.removeItem('moveUseCase');
        setTimeout(scrollToUseCaseSection, 300);
      }
      if (localStorage.getItem('moveIntro') === 'true') {
        localStorage.removeItem('moveIntro');
        var el = document.querySelector('.introduction');
        if (el) setTimeout(function() { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 300);
      }
    });
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
</header>
