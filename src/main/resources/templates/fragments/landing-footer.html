<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="footer">

<style>
  .footer {
    background-color: #212121;
    padding: 60px 0;
  }
  .footer__inner {
    display: flex;
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    gap: 80px;
    padding: 0 1.5rem;
  }
  .footer_logo {
    flex-shrink: 0;
  }
  .footer_logo img {
    width: 120px;
    height: auto;
  }
  .footer__inner .footer_cont {
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .footer__inner .footer_cont .copyright {
    color: #666;
    font-size: 13px;
    font-weight: 400;
    margin-top: 30px;
  }
  .footer__inner .footer_cont ul {
    display: flex;
    flex-wrap: wrap;
    padding: 0;
    margin: 0;
    list-style: none;
  }
  .footer__inner .footer_cont ul.link {
    gap: 30px;
    margin-bottom: 20px;
  }
  .footer__inner .footer_cont ul.link li a {
    font-size: 16px;
    font-weight: 700;
    color: #999;
    text-decoration: none;
  }
  .footer__inner .footer_cont ul.link li:first-child a {
    color: #fff;
  }
  .footer__inner .footer_cont ul li {
    color: #666;
    font-size: 13px;
    line-height: 19px;
    font-weight: 400;
    word-break: keep-all;
  }
  .footer__inner .footer_cont ul li span {
    font-weight: 700;
    color: #333;
    margin-right: 8px;
  }
  .footer__inner .footer_cont ul:not(.link) li:not(:last-of-type)::after {
    margin: 0 8px;
    content: "|";
  }
  @media (max-width: 768px) {
    .footer__inner {
      flex-direction: column;
      gap: 32px;
    }
    .footer__inner .footer_cont ul.link { gap: 20px; }
  }
</style>

<footer class="footer">
  <div class="footer__inner">
    <div class="footer_logo">
      <img th:src="@{/assets/images/f_v_logo.png}" src="/assets/images/f_v_logo.png" alt="브이데스크 로고"/>
    </div>
    <div class="footer_cont">
      <ul class="link">
        <li><a href="/privacy">개인정보취급방침</a></li>
        <li><a href="https://naver.me/5A3p4CZv" target="_blank">오시는 길</a></li>
      </ul>
      <ul>
        <li><span>상호</span>(주)코어플랫폼</li>
        <li><span>대표</span>이주하</li>
        <li><span>사업자번호</span>464-88-02817</li>
        <li><span>통신판매업신고번호</span>2024-부산해운대-1559호</li>
      </ul>
      <ul>
        <li><span>주소</span>부산 해운대구 센텀중앙로 97 센텀스카이비즈 1601호</li>
        <li><span>메일</span>coreplatform09@gmail.com</li>
      </ul>
      <div class="copyright">Copyright©(주)코어플랫폼 All rights Reserved.</div>
    </div>
  </div>
</footer>

</body>
</html>
