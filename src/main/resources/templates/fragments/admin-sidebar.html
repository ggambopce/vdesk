<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<aside th:fragment="sidebar(activePage)"
       style="width:220px;min-width:220px;height:100vh;background:#fff;border-right:1px solid #f0f0f0;display:flex;flex-direction:column;position:sticky;top:0;overflow-y:auto;">

  <!-- Logo -->
  <div style="padding:20px 20px 16px;border-bottom:1px solid #f5f5f5;flex-shrink:0;">
    <a href="/admin" style="display:flex;align-items:center;gap:8px;text-decoration:none;">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="7" fill="#ef4444"/>
        <path d="M7 9h14M7 14h10M7 19h6" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
      <span style="font-size:17px;font-weight:700;color:#111;">Vdesk</span>
      <span style="font-size:11px;font-weight:600;color:#fff;background:#ef4444;border-radius:4px;padding:1px 6px;margin-left:2px;">관리자</span>
    </a>
  </div>

  <!-- Nav -->
  <nav style="padding:12px 10px;flex:1;">

    <!-- 대시보드 -->
    <a href="/admin"
       th:classappend="${activePage == 'dashboard'} ? ' sidebar-active' : ''"
       class="sidebar-link">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24">
        <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" fill="currentColor"/>
      </svg>
      대시보드
    </a>

    <!-- 회원관리 -->
    <a href="/admin/users"
       th:classappend="${activePage == 'users'} ? ' sidebar-active' : ''"
       class="sidebar-link">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24">
        <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z" fill="currentColor"/>
      </svg>
      회원관리
    </a>

    <!-- 결제관리 -->
    <a href="/admin/payments"
       th:classappend="${activePage == 'payments'} ? ' sidebar-active' : ''"
       class="sidebar-link">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24">
        <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z" fill="currentColor"/>
      </svg>
      결제관리
    </a>

    <!-- PC관리 -->
    <a href="/admin/devices"
       th:classappend="${activePage == 'devices'} ? ' sidebar-active' : ''"
       class="sidebar-link">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24">
        <path d="M20 18c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z" fill="currentColor"/>
      </svg>
      PC관리
    </a>

    <!-- 방문자 -->
    <a href="/admin/visitors"
       th:classappend="${activePage == 'visitors'} ? ' sidebar-active' : ''"
       class="sidebar-link">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24">
        <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" fill="currentColor"/>
      </svg>
      방문자
    </a>

    <!-- 방문자 통계 -->
    <a href="/admin/visitors/stats"
       th:classappend="${activePage == 'stats'} ? ' sidebar-active' : ''"
       class="sidebar-link">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24">
        <path d="M5 9.2h3V19H5V9.2zM10.6 5h2.8v14h-2.8V5zm5.6 8H19v6h-2.8v-6z" fill="currentColor"/>
      </svg>
      방문자 통계
    </a>

    <!-- 고객센터 (expandable) -->
    <div id="support-section">
      <button onclick="toggleSupport()"
              style="width:100%;background:none;border:none;cursor:pointer;padding:0;"
              class="sidebar-link sidebar-group-btn"
              th:classappend="${activePage == 'notices' or activePage == 'qna' or activePage == 'faq'} ? ' sidebar-active' : ''">
        <span style="display:flex;align-items:center;gap:10px;flex:1;">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z" fill="currentColor"/>
          </svg>
          고객센터
        </span>
        <svg id="support-chevron" width="14" height="14" fill="none" viewBox="0 0 24 24"
             th:style="${activePage == 'notices' or activePage == 'qna' or activePage == 'faq'} ? 'transform:rotate(180deg);transition:transform 0.2s;' : 'transform:rotate(0deg);transition:transform 0.2s;'">
          <path d="M7 10l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div id="support-submenu"
           th:style="${activePage == 'notices' or activePage == 'qna' or activePage == 'faq'} ? 'display:block' : 'display:none'"
           style="padding-left:28px;">
        <a href="/admin/support/notices"
           th:classappend="${activePage == 'notices'} ? ' sidebar-sub-active' : ''"
           class="sidebar-sub-link">공지사항</a>
        <a href="/admin/support/qna"
           th:classappend="${activePage == 'qna'} ? ' sidebar-sub-active' : ''"
           class="sidebar-sub-link">Q&amp;A</a>
        <a href="/admin/support/faq"
           th:classappend="${activePage == 'faq'} ? ' sidebar-sub-active' : ''"
           class="sidebar-sub-link">FAQ</a>
      </div>
    </div>

  </nav>

  <!-- User info at bottom -->
  <div style="padding:12px 14px;border-top:1px solid #f5f5f5;flex-shrink:0;">
    <a href="/" style="display:flex;align-items:center;gap:7px;text-decoration:none;color:#6b7280;font-size:12px;font-weight:500;">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24">
        <path d="M10 19l-7-7m0 0l7-7m-7 7h18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      메인으로
    </a>
  </div>

  <style>
    * { font-family: 'DM Sans', 'Noto Sans KR', sans-serif; box-sizing: border-box; }
    .sidebar-link {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 8px;
      font-size: 14px; font-weight: 500; color: #374151;
      text-decoration: none; transition: background 0.12s, color 0.12s;
      margin-bottom: 2px; cursor: pointer;
    }
    .sidebar-link:hover { background: #f9fafb; color: #111; }
    .sidebar-link.sidebar-active { background: #fef2f2; color: #ef4444; font-weight: 600; }
    .sidebar-group-btn { text-align: left; }
    .sidebar-sub-link {
      display: block; padding: 7px 10px; border-radius: 6px;
      font-size: 13px; font-weight: 500; color: #6b7280;
      text-decoration: none; transition: background 0.12s, color 0.12s;
      margin-bottom: 1px;
    }
    .sidebar-sub-link:hover { background: #f9fafb; color: #374151; }
    .sidebar-sub-link.sidebar-sub-active { color: #ef4444; font-weight: 600; background: #fef2f2; }
  </style>

  <script>
    function toggleSupport() {
      var menu = document.getElementById('support-submenu');
      var chevron = document.getElementById('support-chevron');
      var open = menu.style.display !== 'none';
      menu.style.display = open ? 'none' : 'block';
      chevron.style.transform = open ? 'rotate(0deg)' : 'rotate(180deg)';
    }
  </script>

</aside>

</body>
</html>
