version: "3.9"

services:
  mariadb:
    image: mariadb:11.4
    container_name: mariadb
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MARIADB_DATABASE: spring-mariadb
      MARIADB_USER: user
      MARIADB_PASSWORD: 1234
      MARIADB_ROOT_PASSWORD: 1234
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --skip-character-set-client-handshake=ON
    volumes:
      - mariadb_data:/var/lib/mysql
      # 초기 스키마/데이터가 필요하면 아래 경로에 .sql 넣어두면 컨테이너 최초 기동 시 실행됨
      # - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u root -p$$MARIADB_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command:
      [
        "redis-server",
        "--appendonly", "yes",
        "--requirepass", "1234",
        "--maxmemory-policy", "allkeys-lru"
      ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "1234", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mariadb_data:
  redis_data:
